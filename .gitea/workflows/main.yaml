name: Create JSON
run-name: Parse RSS into JSON
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - run: |
          apt-get update && apt-get install -y yq
      - run: |
          wget https://enterprise.github.com/releases.rss -O releases.rss
      - run: |
          yq -o=json eval releases.rss > ${{ gitea.workspace }}/json/releases.json
      #  Change directory to repository
      - run: |
          cd ${{ gitea.workspace }}
      - run : |
          git config --global user.name "gitea-actions[bot]"
          git config --global user.email "gitea-actions[bot]@users.noreply.github.com"
          git add json/releases.json
          git commit -m "Update releases.json"
          git push origin master